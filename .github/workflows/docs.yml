# Builds the documentation site (website/) with Material for MkDocs.
# - On pull requests: build with --strict only (catches broken docs before merge).
# - On push to main / manual dispatch: build AND deploy to GitHub Pages.
# Enable Pages with Source = "GitHub Actions" once, in Settings -> Pages.
# Actions are pinned by commit SHA to match repo convention.
name: docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Each job declares its own minimal permissions: the build job (which runs
# PR-controlled requirements + MkDocs config on pull requests) only reads; the
# Pages/OIDC write scopes live on the deploy job, which runs on main only.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: website/requirements.txt
      - run: pip install -r website/requirements.txt
      - run: mkdocs build --strict -f website/mkdocs.yml
      # Only publish the Pages artifact when we're going to deploy (main / dispatch).
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        if: github.ref == 'refs/heads/main'
        with:
          path: website/site

  # Deploy only from main (or a manual dispatch on main); pull requests build-validate above and stop.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # One deployment at a time; never cancel an in-progress deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
