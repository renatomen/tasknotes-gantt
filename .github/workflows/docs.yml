# Builds the documentation site (website/) with Material for MkDocs.
# - On pull requests: build with --strict only (catches broken docs before merge).
# - On push to main / manual dispatch: build AND deploy to GitHub Pages.
# Enable Pages with Source = "GitHub Actions" once, in Settings -> Pages.
# Actions are pinned by commit SHA to match repo convention.
name: docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: website/requirements.txt
      - run: pip install -r website/requirements.txt
      - run: mkdocs build --strict -f website/mkdocs.yml
      # Only publish the Pages artifact when we're going to deploy (main / dispatch).
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: github.ref == 'refs/heads/main'
        with:
          path: website/site

  # Deploy only from main (or a manual dispatch on main); pull requests build-validate above and stop.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    # One deployment at a time; never cancel an in-progress deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
