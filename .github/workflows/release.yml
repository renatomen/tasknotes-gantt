name: Release

# Tag-triggered release. Obsidian community releases use a bare semver tag (no
# leading "v"), matching manifest.json; betas use a `X.Y.Z-beta.N` tag and ship as
# a prerelease (for BRAT testers). Builds from source in CI ("verified against
# source"), attaches the dist/ outputs + manifest.json, and produces a GitHub
# build-provenance attestation. Releases are created as DRAFTS — the maintainer
# reviews and publishes (the final approval gate); the release body is the
# committed, reviewed docs/releases/<TAG>.md (not auto-generated commit notes).
#
# Both tag patterns are GitHub filter globs (where `+` is a quantifier and the
# match is anchored), so a v-prefixed tag does NOT publish. An in-job regex guard
# additionally rejects any malformed tag the glob might admit. `.npmrc` empties
# npm's tag prefix so `npm version` produces bare tags.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    # Job-level (not workflow-level) permissions keep the write/OIDC scopes as
    # narrow as a single-job workflow allows. The residual exposure of
    # contents:write to the build step is what the deferred build/publish job
    # split would close (see plan Alternatives).
    permissions:
      contents: write # create the release + upload assets
      id-token: write # OIDC token for provenance signing
      attestations: write # write the attestation
    steps:
      # Actions are pinned to commit SHAs (not floating tags) so a moved tag
      # cannot poison the attested build. Comments record the human-readable tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # keep the checkout token out of .git/config during the build
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! echo "$TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$'; then
            echo "::error::Tag '$TAG' is not a valid release tag (X.Y.Z or X.Y.Z-beta.N)."
            exit 1
          fi
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install dependencies
        # --ignore-scripts: supply-chain hardening for the attested release build;
        # native deps (rollup/esbuild/@swc) are optionalDependencies, not scripts.
        run: npm ci --ignore-scripts
      - name: Verify release notes file exists
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_PATH="docs/releases/${TAG}.md"
          if [ ! -f "$NOTES_PATH" ]; then
            echo "::error::Missing release notes file $NOTES_PATH. Run /release and commit it before tagging."
            exit 1
          fi
          echo "NOTES_PATH=$NOTES_PATH" >> "$GITHUB_ENV"
      - name: Build from source
        run: npm run build
      - name: Bundle hygiene (no network/eval/base64 in dist/main.js)
        # Same gate as ci.yml, run here too because an embedded-prose match in the
        # inlined release notes would otherwise surface only at release time.
        run: node scripts/check-bundle-hygiene.mjs
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # manifest.json is uploaded and is load-bearing for BRAT/the store, so it
          # is attested alongside the JS/CSS.
          subject-path: |
            dist/main.js
            dist/styles.css
            manifest.json
      - name: Assert attestation was produced
        run: |
          if [ -z "${{ steps.attest.outputs.attestation-id }}" ]; then
            echo "::error::No attestation id was produced; aborting release."
            exit 1
          fi
          echo "Attestation id: ${{ steps.attest.outputs.attestation-id }}"
      - name: Create draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          case "$TAG" in
            *-beta.*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          # --draft: the maintainer reviews provenance and publishes (final gate).
          gh release create "$TAG" \
            dist/main.js dist/styles.css manifest.json \
            --title "$TAG" \
            --notes-file "$NOTES_PATH" \
            --draft $PRERELEASE_FLAG
