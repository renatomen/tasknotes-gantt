name: Release

# Tag-triggered release. Obsidian community releases use a bare semver tag
# (no leading "v"), matching the `manifest.json` version. Builds from source in
# CI so the release is "verified against source", attaches the dist/ outputs,
# and produces a GitHub build-provenance attestation for main.js + styles.css.
#
# The trigger matches ONLY bare semver (leading digit), so a v-prefixed tag
# (e.g. an accidental `v0.0.2` from npm's default tag-version-prefix) does NOT
# publish a non-submittable release. `.npmrc` also empties that prefix so the
# `npm version` flow produces bare tags in the first place.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release + upload assets
  id-token: write # OIDC token for provenance signing
  attestations: write # write the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs (not floating tags) so a moved tag
      # cannot poison the attested build. Comments record the human-readable tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build from source
        run: npm run build
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/main.js
            dist/styles.css
      - name: Assert attestation was produced
        run: |
          if [ -z "${{ steps.attest.outputs.attestation-id }}" ]; then
            echo "::error::No attestation id was produced; aborting release."
            exit 1
          fi
          echo "Attestation id: ${{ steps.attest.outputs.attestation-id }}"
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            dist/main.js dist/styles.css manifest.json \
            --title "$TAG" \
            --generate-notes
