name: Sync BDD Scenarios with AssertThat

on:
  # Scheduled sync - runs daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      auto_merge:
        description: 'Enable auto-merge for conflict-free syncs'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper git operations
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Run sync script
        id: sync
        env:
          ASSERTTHAT_PROJECT_ID: ${{ secrets.ASSERTTHAT_PROJECT_ID }}
          ASSERTTHAT_ACCESS_KEY: ${{ secrets.ASSERTTHAT_ACCESS_KEY }}
          ASSERTTHAT_SECRET_KEY: ${{ secrets.ASSERTTHAT_SECRET_KEY }}
          ASSERTTHAT_TOKEN: ${{ secrets.ASSERTTHAT_TOKEN }}
          JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
        run: |
          echo "Running sync script..."
          npm run sync:assertthat
        continue-on-error: true
      
      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet features/ featureSyncStage/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Create sync branch and PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate branch name with timestamp
          $timestamp = Get-Date -Format "yyyy-MM-dd-HHmmss"
          $branchName = "sync/assertthat-$timestamp"
          
          echo "Creating branch: $branchName"
          
          # Create and switch to new branch
          git checkout -b $branchName
          
          # Stage changes
          git add features/
          git add featureSyncStage/
          
          # Create commit
          git commit -m "chore/sync: OG-47 Sync BDD scenarios with AssertThat

          Automated bidirectional sync of BDD scenarios between GitHub and AssertThat.
          
          This sync was triggered by: ${{ github.event_name }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Push branch
          git push -u origin $branchName
          
          # Create PR
          gh pr create `
            --title "OG-47: Sync BDD scenarios with AssertThat ($timestamp)" `
            --body "## 🔄 Automated Sync

          This PR contains automated synchronization of BDD scenarios between GitHub and AssertThat.

          ### Sync Details
          - **Triggered by**: ${{ github.event_name }}
          - **Timestamp**: $timestamp
          - **Workflow**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### Changes
          Please review the changes in the \`features/\` directory.

          ### Next Steps
          1. Review the changes
          2. Check for any conflicts
          3. Approve and merge if everything looks good

          ---
          *This PR was created automatically by the sync-assertthat workflow*" `
            --label "sync,automated" `
            --base main
          
          # Save PR number for auto-merge
          $prNumber = gh pr view --json number --jq .number
          echo "pr_number=$prNumber" >> $env:GITHUB_OUTPUT
      
      - name: Enable auto-merge
        if: |
          steps.changes.outputs.has_changes == 'true' &&
          (github.event.inputs.auto_merge == 'true' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prNumber = "${{ steps.create-pr.outputs.pr_number }}"
          if ($prNumber) {
            echo "Enabling auto-merge for PR #$prNumber"
            gh pr merge $prNumber --auto --squash
          }
      
      - name: Cleanup on failure
        if: failure()
        shell: bash
        run: |
          echo "Sync failed, cleaning up..."
          git checkout main
          git branch -D sync/assertthat-* 2>/dev/null || echo "No sync branches to clean up"
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 AssertThat Sync Failed',
              body: `The automated sync with AssertThat failed.

              **Workflow Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
              **Triggered by**: ${context.eventName}
              **Time**: ${new Date().toISOString()}

              Please check the workflow logs for details.`,
              labels: ['sync', 'automated', 'failure']
            })
      
      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes detected**: ${{ steps.changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')" >> $GITHUB_STEP_SUMMARY

