name: CI

on:
  pull_request:

# Least privilege: jobs only read the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        # --ignore-scripts: supply-chain hardening; native deps (rollup/esbuild/
        # @swc) are optionalDependencies, not install scripts, so build is unaffected.
        run: npm ci --ignore-scripts
      - name: Assert manifest is a clean release version (no prerelease suffix on main)
        # A `-beta` manifest must never merge to main: it is the store-facing
        # version. Betas are cut on a tag, not on main. Mechanical guard for the
        # manifest-on-main invariant (see docs/RELEASING.md), per "enforce always-X
        # with a mechanism, not memory".
        shell: bash
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::manifest.json version '$VERSION' is not a clean release version (X.Y.Z). A prerelease manifest must not merge to main."
            exit 1
          fi
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Unit tests
        run: npm test --if-present
      - name: Build
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Bundle hygiene (no network/eval/base64 in dist/main.js)
        # The plugin is local-only: the released bundle must contain no network
        # calls, dynamic code execution, or base64 obscuring (scorecard R12). Use
        # the SAME masking-aware check release.yml runs — it strips the inlined
        # release-notes prose before matching, so legitimate notes text like
        # "fixed the fetch() retry" can't false-fail the gate.
        run: node scripts/check-bundle-hygiene.mjs

  e2e:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        # --ignore-scripts: supply-chain hardening (see build job above).
        run: npm ci --ignore-scripts
      - name: Prepare temp vault path
        shell: pwsh
        run: |
          $vault = "$Env:RUNNER_TEMP\\vault"
          echo "OBSIDIAN_TEST_VAULT=$vault" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path $vault | Out-Null
      - name: Build plugin
        # The Vite build installs the plugin into OBSIDIAN_TEST_VAULT (set above,
        # and the temp vault exists) via its closeBundle hook — no separate
        # install step needed. See scripts/install-to-vault.mjs.
        run: npm run build
      - name: Run E2E tests (WDIO)
        # GITHUB_TOKEN authenticates obsidian-launcher's GitHub API calls when it
        # downloads the TaskNotes release (the dependency spec installs it via
        # { repo, version }). Without it the unauthenticated 60/hr shared-runner
        # rate limit intermittently blocks the download → TaskNotes never loads →
        # the dependency spec fails. Authenticated lifts the limit to 5000/hr.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            .wdio-*
            test-results
            **/wdio-*.log
