name: CI

on:
  pull_request:

# Least privilege: jobs only read the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Unit tests
        run: npm test --if-present
      - name: Build
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Bundle hygiene (no network/eval/base64 in dist/main.js)
        shell: bash
        run: |
          # The plugin is local-only: the released bundle must contain no
          # network calls, dynamic code execution, or base64 obscuring. Match
          # CALL patterns (not bare keywords) so the SVAR comment "are fetched
          # lazily" doesn't false-fail. If a dependency reintroduces any of
          # these, fail CI so it gets disclosed or removed (scorecard R12).
          if grep -E '\beval\(|new Function|\.atob\(|\batob\(|\bbtoa\(|XMLHttpRequest|\bfetch\(|sendBeacon|new WebSocket' dist/main.js; then
            echo "::error::Forbidden runtime pattern found in dist/main.js (network/eval/base64)."
            exit 1
          fi
          echo "bundle hygiene OK: no network/eval/base64 call-patterns in dist/main.js"

  e2e:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Prepare temp vault path
        shell: pwsh
        run: |
          $vault = "$Env:RUNNER_TEMP\\vault"
          echo "OBSIDIAN_TEST_VAULT=$vault" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path $vault | Out-Null
      - name: Build plugin
        run: npm run build
      - name: Install plugin into temp vault
        run: node scripts/install-to-vault.cjs
      - name: Run E2E tests (WDIO)
        # GITHUB_TOKEN authenticates obsidian-launcher's GitHub API calls when it
        # downloads the TaskNotes release (the dependency spec installs it via
        # { repo, version }). Without it the unauthenticated 60/hr shared-runner
        # rate limit intermittently blocks the download → TaskNotes never loads →
        # the dependency spec fails. Authenticated lifts the limit to 5000/hr.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run e2e
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            .wdio-*
            test-results
            **/wdio-*.log
