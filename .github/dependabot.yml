version: 2
updates:
  # Keep SHA-pinned GitHub Actions current: Dependabot bumps the commit SHA and
  # rewrites the `# vX` comment, so pinning to immutable SHAs stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']

  # Keep npm dependencies current. Minor/patch bumps are grouped into one PR to
  # limit noise; majors come as individual PRs for deliberate review.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
