version: 2
updates:
  # Keep SHA-pinned GitHub Actions current: Dependabot bumps the commit SHA and
  # rewrites the `# vX` comment, so pinning to immutable SHAs stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']

  # npm: security updates only. This plugin bundles its dependencies into
  # main.js at build time (users never `npm install` them), and CI already
  # fails on high-severity vulnerabilities (`npm audit --audit-level=high`), so
  # routine version-bump PRs are noise with no user-facing benefit — and major
  # bumps (eslint/vite/typescript) are breaking changes handled deliberately,
  # not on a schedule. `open-pull-requests-limit: 0` disables version-update
  # PRs; Dependabot still opens PRs for known security vulnerabilities.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
