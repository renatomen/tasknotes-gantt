# SonarQube Cloud (SonarCloud) analysis configuration.
# Honored under CI-based analysis (.github/workflows/sonar.yml). NOTE: these
# settings are ignored by Automatic Analysis — Automatic Analysis must be
# DISABLED in the SonarCloud project (Administration > Analysis Method) for
# CI-based analysis to run and to import coverage.

sonar.projectKey=renatomen_obsidian-gantt
# Organization key — verify in SonarCloud (Account > Organizations). For a
# project key of the form "<org>_<repo>" this is the "<org>" part.
sonar.organization=renatomen

# Source vs test layout.
sonar.sources=src
sonar.tests=test

# Test coverage: the LCOV report produced by `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test fixtures from copy-paste (duplication) detection: the .base/.md
# fixtures under test/vaults are intentionally near-identical (e.g. a "show all"
# vs "hide undated" variant of the same Base), so CPD flags them as duplicated
# "new code" on any change that touches them — a false signal, not a defect.
sonar.cpd.exclusions=test/vaults/**

# Coverage exclusions: code with no unit to test, so it has no meaningful LCOV
# data — excluding it keeps the metric honest rather than penalizing
# untestable-by-unit files. Kept in sync with jest.config.mjs collectCoverageFrom.
#   - *.svelte / *.d.ts: UI components (e2e-tested) and ambient declarations
#   - **/types/**, **/types.ts: type-only declaration files (no runtime code)
#   - **/index.ts: barrel re-exports
#   - main.ts, GanttBasesView.ts: thin Obsidian wiring (e2e-tested)
# NOT excluded: register.ts, views/* — logic-dense; their logic is extracted
# into tested modules (plan U2/U5), not hidden behind an exclusion.
sonar.coverage.exclusions=**/*.svelte,src/**/*.d.ts,src/**/types/**,src/**/types.ts,src/**/index.ts,src/main.ts,src/bases/GanttBasesView.ts
