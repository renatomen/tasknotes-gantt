# BDD Semantic Tag Registry
# Curated list of semantic tags for BDD scenarios
# Tags represent high-level feature categories

version: '2.1'
last_updated: '2026-01-09'
maintainer: 'obsidian-gantt-team'

# Feature domain tags - high-level functional areas
feature_domains:
  # Core Gantt functionality
  '@gantt-visualization':
    description: 'Gantt chart rendering and visualization'
  '@column-management':
    description: 'Column configuration and display'
  '@task-rendering':
    description: 'Task bar rendering and display'
  '@task-editing':
    description: 'Interactive task editing'
  '@task-management':
    description: 'Task lifecycle and management'
  '@timeline':
    description: 'Timeline and date visualization'

  # Bases plugin integration
  '@bases-integration':
    description: 'Integration with Obsidian Bases plugin'
  '@view-lifecycle':
    description: 'View mounting, updating, unmounting'
  '@bases-unavailable':
    description: 'Handling when Bases plugin is unavailable'

  # Data handling
  '@data-mapping':
    description: 'Data model mapping and transformation'
  '@data-transformation':
    description: 'Data format conversion'
  '@date-handling':
    description: 'Date parsing and manipulation'
  '@date-editing':
    description: 'Interactive date editing'
  '@date-validation':
    description: 'Date validation'
  '@data-loading':
    description: 'Data loading and fetching'
  '@data-updates':
    description: 'Data update handling'
  '@missing-data':
    description: 'Handling missing or incomplete data'

  # Responsive and mobile
  '@responsive-design':
    description: 'Responsive layout and mobile support'
  '@mobile':
    description: 'Mobile-specific features'
  '@touch-interaction':
    description: 'Touch-based interactions'
  '@layout':
    description: 'Layout and positioning'

  # Error handling
  '@error-handling':
    description: 'Error detection and recovery'
  '@validation':
    description: 'Input and data validation'
  '@recovery':
    description: 'Recovery from failures'
  '@graceful-degradation':
    description: 'Fallback behavior'
  '@configuration-errors':
    description: 'Configuration validation errors'
  '@cleanup':
    description: 'Resource cleanup'

  # Sync and integration
  '@sync':
    description: 'Data synchronization'
  '@upload':
    description: 'Upload operations'
  '@download':
    description: 'Download operations'
  '@batch':
    description: 'Batch operations'
  '@round-trip':
    description: 'Round-trip data consistency'
  '@real-time-sync':
    description: 'Real-time synchronization'

  # Virtual tasks (multi-parent scenarios)
  '@virtual-tasks':
    description: 'Virtual task handling for multi-parent scenarios'
  '@multi-parent':
    description: 'Multi-parent task relationships'

  # Plugin integration
  '@plugin-loading':
    description: 'Plugin loading and initialization'

# Technical concern tags
technical_concerns:
  '@performance':
    description: 'Performance optimization'
  '@large-datasets':
    description: 'Handling large data volumes'
  '@accessibility':
    description: 'Accessibility features'
  '@configuration':
    description: 'Configuration and settings'

# Test type tags
test_types:
  '@smoke':
    description: 'Critical path validation (fast)'
  '@integration':
    description: 'Cross-component testing'
  '@regression':
    description: 'Regression prevention'
  '@bdd-test':
    description: 'BDD framework testing'
  '@batch-test':
    description: 'Batch operation testing'
  '@round-trip-test':
    description: 'Round-trip validation'

# AssertThat BDD Platform Tags
assertthat_platform:
  '@AUTOMATED':
    description: 'Automated scenario (AssertThat platform)'
    platform: 'assertthat-bdd'
  '@imported-from-github':
    description: 'Synced from GitHub (AssertThat platform)'
    platform: 'assertthat-bdd'

# Validation rules
validation:
  required_tags: []  # No required tags

  recommended_patterns:
    - 'Use feature domain tags for primary categorization'
    - 'Add technical concern tags as needed'
    - 'Include test type tags for execution planning'

# Tag usage guidelines
guidelines:
  feature_domains:
    - 'Choose 1-3 domain tags that best describe the scenario'
    - 'Use high-level categories, not micro-level details'
    - 'Tags should help organize and filter related scenarios'

  technical_concerns:
    - 'Add for cross-cutting technical issues'
    - 'Use sparingly for important non-functional concerns'

  test_types:
    - 'Include for test execution planning'
    - 'Smoke tests should be fast and reliable'

  metadata_comments:
    - 'Use comments (not tags) for IDs: # assertthat-feature-id: xyz'
    - 'Use comments (not tags) for metadata: # assertthat-scenario-id: abc'
    - 'Comments do NOT use @ prefix'

# Change log
changelog:
  - version: '2.1'
    date: '2026-01-09'
    changes:
      - 'Updated metadata comment format - removed @ prefix from comments'
      - 'Simplified to high-level feature categories only'
      - 'Removed 100+ micro-level tags in favor of broader categorization'
      - 'Added metadata_comments guidelines'
  - version: '2.0'
    date: '2026-01-09'
    changes:
      - 'Simplified registry structure - removed epic/feature/priority prefixes'
      - 'Tags now directly represent feature domains'
      - 'Removed priority validation requirements'
  - version: '1.1'
    date: '2026-01-09'
    changes:
      - 'Added AssertThat platform integration tags'
  - version: '1.0'
    date: '2025-09-26'
    changes:
      - 'Initial semantic tag registry creation'
